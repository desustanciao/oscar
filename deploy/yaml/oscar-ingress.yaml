apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: oscar
  name: oscar
  annotations:
    #nginx.ingress.kubernetes.io/rewrite-target: /
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
        - pathType: Prefix
          path: /
          backend:
            service:
              name: oscar
              port: 
                number: 8080
        