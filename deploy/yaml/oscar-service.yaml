apiVersion: v1
kind: Service
metadata:
  name: oscar
  namespace: oscar
  labels:
    app: oscar
    monitoring: "true"
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
      nodePort: 30302
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Cluster
  selector:
    app: oscar